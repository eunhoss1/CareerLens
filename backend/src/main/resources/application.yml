server:
  port: 8080

spring:
  application:
    name: careerlens-backend
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/careerlens?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:lucky369@yahoo}
    driver-class-name: ${DB_DRIVER:org.mariadb.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    property-naming-strategy: SNAKE_CASE

careerlens:
  seed:
    path: ../seed-data/recommendation-seed.json
    processed-path: ../seed-data/processed

app:
  cors:
    allowed-origins: http://localhost:3000
  ai:
    provider: ${AI_PROVIDER:openai}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-5.4}
      responses-url: ${OPENAI_RESPONSES_URL:https://api.openai.com/v1/responses}
      enabled: ${AI_PLANNER_ENABLED:false}
    groq:
      api-key: ${GROQ_API_KEY:}
      model: ${GROQ_MODEL:openai/gpt-oss-20b}
      responses-url: ${GROQ_RESPONSES_URL:https://api.groq.com/openai/v1/responses}
  travel:
    provider: ${TRAVEL_PROVIDER:duffel}
    duffel:
      enabled: ${DUFFEL_ENABLED:false}
      access-token: ${DUFFEL_ACCESS_TOKEN:}
      base-url: ${DUFFEL_BASE_URL:https://api.duffel.com}
      version: ${DUFFEL_VERSION:v2}
      supplier-timeout-millis: ${DUFFEL_SUPPLIER_TIMEOUT_MILLIS:10000}
    amadeus:
      enabled: ${AMADEUS_ENABLED:false}
      client-id: ${AMADEUS_CLIENT_ID:}
      client-secret: ${AMADEUS_CLIENT_SECRET:}
      base-url: ${AMADEUS_BASE_URL:https://test.api.amadeus.com}
      currency-code: ${AMADEUS_CURRENCY_CODE:KRW}
